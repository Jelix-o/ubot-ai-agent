name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-release:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build release package
        run: npm run package:win

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: UBot V1.0.2
          body_path: RELEASE-v1.0.2.md
          files: release/ubot-1.0.2-win.zip
